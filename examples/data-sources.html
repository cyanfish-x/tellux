<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tellux Imagery Data Sources</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="viewer-shell">
      <div id="viewer"></div>
      <section class="toolbar toolbar--wide" aria-label="Imagery data source controls">
        <h1>数据源切换</h1>
        <p>切换 XYZ / Cesium Ion 底图，并用开关把 OpenInfraMap MVT 矢量瓦片叠加到当前表面。</p>
        <p id="source-status" class="status" aria-live="polite"></p>
        <div class="toolbar__row" id="source-buttons"></div>
        <label class="switch">
          <input id="mvt-overlay-toggle" type="checkbox" />
          <span>叠加 OpenInfraMap MVT</span>
        </label>
        <a class="button" href="./index.html">返回目录</a>
      </section>
    </main>
    <script type="module" src="./data-sources.ts"></script>
  </body>
</html>
