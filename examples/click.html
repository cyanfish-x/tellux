<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tellux Click Event</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="viewer-shell">
      <div id="viewer"></div>
      <section class="toolbar" aria-label="Click event readout">
        <h1>点击事件</h1>
        <p>点击画布后，示例会通过 <code>viewer.on('click')</code> 显示相对于 canvas 左上角的像素坐标。</p>
        <p id="token-status" class="status" aria-live="polite"></p>
        <dl class="click-readout">
          <dt>X</dt>
          <dd id="click-x">-</dd>
          <dt>Y</dt>
          <dd id="click-y">-</dd>
          <dt>次数</dt>
          <dd id="click-count">0</dd>
        </dl>
        <div class="toolbar__row">
          <button class="button" id="clear" type="button">清空</button>
          <a class="button" href="./index.html">返回目录</a>
        </div>
      </section>
    </main>
    <script type="module" src="./click.ts"></script>
  </body>
</html>
