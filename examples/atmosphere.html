<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tellux Atmosphere and Clouds</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="viewer-shell">
      <div id="viewer"></div>
      <section class="toolbar toolbar--wide" aria-label="Atmosphere and clouds controls">
        <h1>体积云与大气</h1>
        <div class="toolbar__row">
          <label class="switch">
            <input id="sky-toggle" type="checkbox" checked />
            大气
          </label>
          <label class="switch">
            <input id="cloud-toggle" type="checkbox" checked />
            体积云
          </label>
        </div>
        <label class="field">
          UTC 时间
          <input id="time-range" class="field__input" type="range" min="0" max="24" step="0.05" value="8" />
        </label>
        <label class="field">
          云覆盖率
          <input id="coverage-range" class="field__input" type="range" min="0" max="1" step="0.01" value="0.35" />
        </label>
        <label class="field">
          低云云底高度
          <input id="cloud-altitude-range" class="field__input" type="range" min="200" max="4000" step="50" value="750" />
        </label>
        <label class="field">
          低云厚度
          <input id="cloud-height-range" class="field__input" type="range" min="100" max="3000" step="50" value="650" />
        </label>
        <label class="field">
          渲染像素倍率
          <input id="resolution-range" class="field__input" type="range" min="0.5" max="2" step="0.05" value="1" />
        </label>
        <label class="field">
          曝光
          <input id="exposure-range" class="field__input" type="range" min="2" max="14" step="0.1" value="8" />
        </label>
        <p id="atmosphere-status" class="status" aria-live="polite"></p>
        <div class="toolbar__row">
          <button class="button" id="pacific" type="button">太平洋</button>
          <button class="button" id="himalaya" type="button">喜马拉雅</button>
          <a class="button" href="./index.html">返回目录</a>
        </div>
      </section>
    </main>
    <script type="module" src="./atmosphere.ts"></script>
  </body>
</html>
